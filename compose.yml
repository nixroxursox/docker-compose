volumes:
  sockets:
  so_files:
  bitcoin:
  mysql-data:
  mysql-logs:
  mysql-files:
  postgres-data:
  odooProd-logs:
  pools:
    driver: local

networks:
  ecommnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.7.0/26
          gateway: 10.89.7.1
  dnsnet:
    driver: bridge
    ipam:
      config:
      - subnet: 10.89.6.0/26
        gateway: 10.89.6.1
