<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      <link rel="stylesheet" href="http://localhost/webdev/css/w3.css">

      body {font-family: Arial, Helvetica, sans-serif;}
      form {border: 0px solid #f1f1f1;}

      input[type=text], input[type=password], input[type=captcha] {
        width: 96%;
        padding: 12px 20px;
        margin: 8px 0;
        display: inline-block;
        border: 1px solid #ccc;
        box-sizing: border-box;
      }

      button {
        background-color: #FFFFFF;
        color: #800000;
        padding: 8px 16px;
        margin: 8px 0;
        border: 0px solid #ccc;
        cursor: pointer;
        width: 26%;
        font-size: 20px;
      }

      button:hover {
        opacity: 0.8;
      }

      .imgcontainer {
        text-align: center;
        margin: 20px 0 20px 0;
      }

      span.password {
        float: right;
        padding-top: 16px;
      }

    /* Change styles for span and cancel button on extra small screens */
      @media screen and (max-width: 300px) {
    span.password {
       display: block;
       float: none;
    }
    .cancelbtn {
       width: 100%;
    }
  }

      .grid-container {
        display: grid;
        grid-template-columns: 38% 25% 38%;
        background-color: #800000;
        padding: 1px;
      }

      .grid-item {
        background-color: #FFFFFF;
        border: 0;
        padding: 20px;
        font-size: 30px;
        color: #000000;
        text-align: center;
      }

      .login-item {
        background-color: #80000;
        border: ##36454f;
        padding: 5px;
        font-size: 20px;
        color: white;
        text-align: center;
      }

      a:link {
        color: #FFFFFF;
        background-color: transparent;
        text-decoration: none;
      }
      a:visited {
        color: pink;
        background-color: transparent;
        text-decoration: none;
      }
a:hover {
  color: red;
  background-color: transparent;
  text-decoration: underline;
}
a:active {
  color: yellow;
  background-color: transparent;
  text-decoration: underline;
}

    </style>
  </head>
  <body>

<div class="grid-container">
  <div class="grid-item">1</div>
  <div class="login-item padding="12px">
    <form action="?c=users&a=doLogin" method="post">
    <label for="name"><b>Username</b></label>
    <input type="text" placeholder="Enter Username" name="name" required="yes">

    <label for="password"><b>Password</b></label>
    <input type="password" placeholder="Enter Password" name="password" required>
  </div>
    <div class="grid-item">3</div>
    <div class="grid-item">4</div>
    <div class="login-item">
    <img src="http://localhost/index.php?c=users&a=captcha" alt="Captcha" style="width:96%;max-width:400px">
    <input type="text" placeholder="Enter the Numbers/letters shown above" name="captcha" required>
  <button type="submit">Login</button>
  <label class="login-item">
    <input type="checkbox" checked="checked" name="remember"> Remember me
  </label>
  </form>
      </div>
  <div class="grid-item">6</div>
  <div class="grid-item">7</div>
  <div class="login-item">
    <label>
      <a href=http://localhost/index.php?c=users&a=register>Register</a>
    </label>
  </div>
  <div class="grid-item">9</div>
</div>

</body>
</html>
