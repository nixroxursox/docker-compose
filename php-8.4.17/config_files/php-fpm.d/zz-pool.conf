[global]
daemonize = no

[www]
listen = /tmp/php-fpm.sock
listen.owner = phpUser
listen.group = phpUser
listen.mode = 1666
listen.backlog = 511

;user = phpUser
;group = phpUser

pm = dynamic
pm.max_children = 10
pm.start_servers = 4
pm.min_spare_servers = 3
pm.max_spare_servers = 8


env[DOCUMENT_ROOT] = /var/www/html/public

access.log = /proc/self/fd/2
access.format = "%t: %n %{user}C - %{system}C %s %d %m %p %P %r %R %s"
